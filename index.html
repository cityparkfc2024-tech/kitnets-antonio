<script type="text/babel" data-presets="react">
const {useState} = React;
const MESES=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const MESES_FULL=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const HOJE=new Date();
const INITIAL_UNITS=[

{id:2,tipo:"kitnet",nome:"Kitnet 02",morador:"",inicio:"",saida:"",aluguel:0,vigencia:12,diaCobranca:5,status:"vago"},
{id:3,tipo:"kitnet",nome:"Kitnet 03",morador:"",inicio:"",saida:"",aluguel:0,vigencia:12,diaCobranca:5,status:"vago"},
{id:4,tipo:"kitnet",nome:"Kitnet 04",morador:"",inicio:"",saida:"",aluguel:0,vigencia:12,diaCobranca:5,status:"vago"},
{id:5,tipo:"kitnet",nome:"Kitnet 05",morador:"",inicio:"",saida:"",aluguel:0,vigencia:12,diaCobranca:5,status:"vago"},
{id:6,tipo:"kitnet",nome:"Kitnet 06",morador:"",inicio:"",saida:"",aluguel:0,vigencia:12,diaCobranca:5,status:"vago"},
{id:7,tipo:"comercial",nome:"Espaço Comercial",morador:"",inicio:"",saida:"",aluguel:0,vigencia:12,diaCobranca:10,status:"vago"},
];
const fmt=v=>Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const sColor=s=>s==="pago"?"#22c55e":s==="atrasado"?"#ef4444":"#f59e0b";
const sLabel=s=>s==="pago"?"Pago":s==="atrasado"?"Atrasado":"Pendente";
const calcAluguel=(unit,ano,mes,lancs)=>{
  if(unit.status==="vago")return null;
  const prefix=`${ano}-${String(mes+1).padStart(2,"0")}`;
  const ms=lancs.filter(l=>l.tipo==="receita"&&l.unidade===unit.id&&l.data.startsWith(prefix));
  const pago=ms.reduce((a,b)=>a+b.valor,0);
  const venc=new Date(ano,mes,unit.diaCobranca||5);
  let status=pago>=unit.aluguel?"pago":HOJE>venc?"atrasado":"pendente";
  return{status,pago,pendente:Math.max(0,unit.aluguel-pago),pagamentos:ms.map(l=>({data:l.data,valor:l.valor}))};
};
const Card=({children,style={}})=><div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:20,...style}}>{children}</div>;
const Pill=({children,active,onClick})=><button onClick={onClick} style={{padding:"7px 16px",borderRadius:30,border:active?"1px solid #f59e0b":"1px solid rgba(255,255,255,0.12)",background:active?"#f59e0b22":"transparent",color:active?"#f59e0b":"#aaa",fontWeight:600,fontSize:13,cursor:"pointer",whiteSpace:"nowrap"}}>{children}</button>;
const SL=({children,color})=><div style={{fontSize:10,color:color||"#888",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5,fontWeight:600}}>{children}</div>;
const bi={width:"100%",padding:"9px 11px",borderRadius:9,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.06)",color:"#fff",fontSize:13,boxSizing:"border-box"};

function Home({units,lancs}){
  const mes=HOJE.getMonth(),ano=HOJE.getFullYear();
  const px=`${ano}-${String(mes+1).padStart(2,"0")}`;
  const rec=lancs.filter(l=>l.data.startsWith(px)&&l.tipo==="receita").reduce((a,b)=>a+b.valor,0);
  const des=lancs.filter(l=>l.data.startsWith(px)&&l.tipo==="despesa").reduce((a,b)=>a+b.valor,0);
  const atras=units.filter(u=>calcAluguel(u,ano,mes,lancs)?.status==="atrasado");
  return <div style={{display:"flex",flexDirection:"column",gap:18}}>
    <div><div style={{fontSize:11,color:"#f59e0b",letterSpacing:2,textTransform:"uppercase",fontWeight:700}}>Resumo Geral</div>
    <div style={{fontSize:22,fontWeight:800,marginTop:4}}>Prédio — Nova Marabá</div>
    <div style={{fontSize:12,color:"#888",marginTop:2}}>Folha 29 · Q21 · L24 · Marabá–PA</div></div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      {[{label:"Ocupadas",value:units.filter(u=>u.status==="ocupado").length,icon:"🏠",color:"#22c55e"},
        {label:"Vagas",value:units.filter(u=>u.status==="vago").length,icon:"🔑",color:"#f59e0b"},
        {label:`Receita ${MESES[mes]}`,value:fmt(rec),icon:"💰",color:"#3b82f6"},
        {label:`Despesas ${MESES[mes]}`,value:fmt(des),icon:"📋",color:"#ef4444"}
      ].map((x,i)=><Card key={i} style={{textAlign:"center",padding:14}}><div style={{fontSize:24}}>{x.icon}</div><div style={{fontSize:18,fontWeight:800,color:x.color,marginTop:4}}>{x.value}</div><div style={{fontSize:11,color:"#888",marginTop:2}}>{x.label}</div></Card>)}
    </div>
    <Card><div style={{fontSize:12,color:"#f59e0b",fontWeight:700,marginBottom:12,letterSpacing:1,textTransform:"uppercase"}
